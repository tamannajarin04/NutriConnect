{% extends "base.html" %}
{% block title %}Reset Password - NutriConnect{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-header text-center py-3">
        <div style="width:56px;height:56px;border-radius:50%;
                    background:rgba(0,212,255,0.12);border:1px solid rgba(0,212,255,0.25);
                    display:flex;align-items:center;justify-content:center;
                    margin:0 auto 0.75rem;">
          <i class="fas fa-key" style="font-size:1.4rem;color:#00d4ff;"></i>
        </div>
        <h4 class="mb-0 fw-bold">Reset Password</h4>
        <p class="text-muted small mt-1 mb-0">Choose a strong new password for your account.</p>
      </div>

      <div class="card-body p-4">

        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" id="resetForm">

          {# ── New Password ── #}
          <div class="mb-3">
            <label class="form-label fw-semibold" for="password">
              <i class="fas fa-lock me-1 text-muted"></i> New Password
            </label>
            <div class="input-group">
              <input type="password" class="form-control" id="password"
                     name="password" placeholder="At least 8 characters"
                     required minlength="8" autofocus>
              <button class="btn btn-outline-secondary" type="button"
                      onclick="togglePass('password', this)"
                      tabindex="-1">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            {# strength bar #}
            <div class="mt-2" id="strengthWrap" style="display:none">
              <div style="height:4px;border-radius:99px;background:rgba(255,255,255,0.08);overflow:hidden">
                <div id="strengthBar"
                     style="height:100%;width:0%;border-radius:99px;transition:width .3s,background .3s"></div>
              </div>
              <small id="strengthLabel" class="text-muted" style="font-size:.7rem"></small>
            </div>
          </div>

          {# ── Confirm Password ── #}
          <div class="mb-4">
            <label class="form-label fw-semibold" for="password2">
              <i class="fas fa-lock-open me-1 text-muted"></i> Confirm New Password
            </label>
            <div class="input-group">
              <input type="password" class="form-control" id="password2"
                     name="password2" placeholder="Repeat your new password"
                     required minlength="8">
              <button class="btn btn-outline-secondary" type="button"
                      onclick="togglePass('password2', this)"
                      tabindex="-1">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <small id="matchMsg" style="font-size:.75rem;display:none"></small>
          </div>

          {# ── Submit ── #}
          <button type="submit" class="btn btn-success w-100 py-2 fw-bold" id="submitBtn">
            <i class="fas fa-check me-1"></i> Update Password
          </button>

        </form>

        <div class="text-center mt-3">
          <a href="{{ url_for('auth.login') }}" class="small text-muted">
            <i class="fas fa-arrow-left me-1"></i> Back to Login
          </a>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
  // ── Toggle password visibility ──────────────────────────────────────────
  function togglePass(fieldId, btn) {
    const input = document.getElementById(fieldId);
    const icon  = btn.querySelector("i");
    if (input.type === "password") {
      input.type = "text";
      icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
      input.type = "password";
      icon.classList.replace("fa-eye-slash", "fa-eye");
    }
  }

  // ── Password strength ───────────────────────────────────────────────────
  const p1       = document.getElementById("password");
  const p2       = document.getElementById("password2");
  const bar      = document.getElementById("strengthBar");
  const label    = document.getElementById("strengthLabel");
  const wrap     = document.getElementById("strengthWrap");
  const matchMsg = document.getElementById("matchMsg");

  p1.addEventListener("input", function () {
    const v = this.value;
    wrap.style.display = v ? "block" : "none";

    let score = 0;
    if (v.length >= 8)               score++;
    if (/[A-Z]/.test(v))             score++;
    if (/[0-9]/.test(v))             score++;
    if (/[^A-Za-z0-9]/.test(v))      score++;

    const map = [
      { w: "25%",  bg: "#ef4444", text: "Weak" },
      { w: "50%",  bg: "#f97316", text: "Fair" },
      { w: "75%",  bg: "#eab308", text: "Good" },
      { w: "100%", bg: "#22c55e", text: "Strong" },
    ];
    const s = map[score - 1] || map[0];
    bar.style.width      = s.w;
    bar.style.background = s.bg;
    label.textContent    = s.text;
    label.style.color    = s.bg;

    checkMatch();
  });

  // ── Confirm match ───────────────────────────────────────────────────────
  p2.addEventListener("input", checkMatch);

  function checkMatch() {
    if (!p2.value) { matchMsg.style.display = "none"; return; }
    matchMsg.style.display = "block";
    if (p1.value === p2.value) {
      matchMsg.textContent  = "✓ Passwords match";
      matchMsg.style.color  = "#22c55e";
    } else {
      matchMsg.textContent  = "✗ Passwords do not match";
      matchMsg.style.color  = "#ef4444";
    }
  }

  // ── Block submit if mismatch ────────────────────────────────────────────
  document.getElementById("resetForm").addEventListener("submit", function (e) {
    if (p1.value !== p2.value) {
      e.preventDefault();
      matchMsg.style.display = "block";
      matchMsg.textContent   = "✗ Passwords do not match";
      matchMsg.style.color   = "#ef4444";
      p2.focus();
    }
  });
</script>
{% endblock %}
