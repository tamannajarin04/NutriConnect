{% extends "base.html" %}
{% block title %}Forgot Password - NutriConnect{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">

      <div class="card-header text-center py-3">
        <div style="width:56px;height:56px;border-radius:50%;
                    background:rgba(0,212,255,0.12);border:1px solid rgba(0,212,255,0.25);
                    display:flex;align-items:center;justify-content:center;
                    margin:0 auto 0.75rem;">
          <i class="fas fa-lock-open" style="font-size:1.4rem;color:#00d4ff;"></i>
        </div>
        <h4 class="mb-0 fw-bold">Forgot Password</h4>
        <p class="text-muted small mt-1 mb-0">
          Enter your email and we'll send you a reset link.
        </p>
      </div>

      <div class="card-body p-4">

        <form method="POST" action="{{ url_for('auth.forgot_password') }}">

          <div class="mb-4">
            <label class="form-label fw-semibold" for="email">
              <i class="fas fa-envelope me-1 text-muted"></i> Email address
            </label>
            <input type="email" class="form-control" id="email"
                   name="email" placeholder="example@email.com"
                   required autofocus>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
            <i class="fas fa-paper-plane me-1"></i> Send Reset Link
          </button>

        </form>

        <div class="text-center mt-3">
          <a href="{{ url_for('auth.login') }}" class="small text-muted">
            <i class="fas fa-arrow-left me-1"></i> Back to Login
          </a>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}
