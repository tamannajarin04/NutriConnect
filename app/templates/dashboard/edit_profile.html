{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">

      <div class="card-header">
        <h4 class="mb-0">
          <i class="fas fa-edit"></i> Edit Profile
        </h4>
      </div>

      <div class="card-body">
        <form method="POST" enctype="multipart/form-data" action="{{ url_for('user_dashboard.edit_profile') }}">

          <div class="mb-4 text-center">
            {% if user.profile_picture %}
              <img
                src="{{ url_for('static', filename=user.profile_picture) }}"
                alt="Profile Picture"
                class="rounded-circle mb-3"
                style="width:150px;height:150px;object-fit:cover;"
              >
            {% else %}
              <div
                class="rounded-circle bg-primary text-white d-inline-flex align-items-center justify-content-center mb-3"
                style="width:150px;height:150px;font-size:48px;"
              >
                {{ (user.first_name or user.username or 'U')[0] }}
              </div>
            {% endif %}

            <div>
              <label class="form-label">Change Profile Picture</label>
              <input
                class="form-control"
                type="file"
                name="profile_picture"
                accept="image/*"
              >
              <small class="text-muted">
                PNG / JPG / JPEG / GIF (Max 5MB)
              </small>
            </div>
          </div>

          <hr>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">First Name</label>
              <input
                class="form-control"
                name="first_name"
                value="{{ user.first_name }}"
                required
              >
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Last Name</label>
              <input
                class="form-control"
                name="last_name"
                value="{{ user.last_name }}"
                required
              >
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              class="form-control"
              type="email"
              name="email"
              value="{{ user.email }}"
              required
            >
          </div>

          <div class="d-flex justify-content-between mt-4">
            <a href="{{ url_for('user_dashboard.view_profile') }}" class="btn btn-secondary">
              <i class="fas fa-times"></i> Cancel
            </a>
            <button class="btn btn-primary" type="submit">
              <i class="fas fa-save"></i> Save Changes
            </button>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
